<!doctype html>
<html lang="es-mx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>No disponible — La Recepción</title>
<script>
(function(){try{var g=localStorage.getItem('despacho-tema');
if(g==='dark'){document.documentElement.classList.add('dark');}
else if(g==='light'){document.documentElement.classList.remove('dark');}
else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.classList.add('dark');}}catch(e){}})();
</script>
<style>
:root{--bg:#fafaf9;--fg:#1c1917;--card:#fff;--border:#e7e5e4;--muted:#57534e;--note:#a8a29e;}
html.dark{--bg:#0f172a;--fg:#f1f5f9;--card:#1e293b;--border:#334155;--muted:#cbd5e1;--note:#64748b;}
body{font-family:ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--fg);margin:0;padding:48px 24px;text-align:center}
h1{margin:0 0 8px;font-size:24px}
p{color:var(--muted);line-height:1.5}
.box{max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:40px 28px}
</style>
</head>
<body>
<div class="box">
    <h1>Esta sección aún no está activa</h1>
    <p>El portal de clientes y el inicio de sesión con Google se habilitarán
       cuando se libere La Recepción. Por ahora, El Despacho opera solo con
       el equipo interno.</p>
    <p style="font-size:12px;color:var(--note);margin-top:24px">El Despacho · Learning Center</p>
</div>
</body>
</html>
