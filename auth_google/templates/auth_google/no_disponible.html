<!doctype html>
<html lang="es-mx">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>No disponible — La Recepción</title>
<script>
(function(){try{var g=localStorage.getItem('despacho-tema');
if(g==='dark'){document.documentElement.classList.add('dark');}
else if(g==='light'){document.documentElement.classList.remove('dark');}
else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches){document.documentElement.classList.add('dark');}}catch(e){}})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
<style>
/* Variables alineadas con la paleta gray de TailAdmin portada en S-TailAdmin-1. */
:root{--bg:#f9fafb;--fg:#101828;--card:#fff;--border:#e4e7ec;--muted:#475467;--note:#98a2b3;}
html.dark{--bg:#0c111d;--fg:#f2f4f7;--card:#1d2939;--border:#344054;--muted:#d0d5dd;--note:#667085;}
body{font-family:'Outfit',ui-sans-serif,system-ui,sans-serif;background:var(--bg);color:var(--fg);margin:0;padding:48px 24px;text-align:center}
h1{margin:0 0 8px;font-size:24px;font-weight:600;letter-spacing:-0.01em}
p{color:var(--muted);line-height:1.5}
.box{max-width:560px;margin:0 auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px 28px;box-shadow:0 1px 2px rgba(16,24,40,0.05)}
</style>
</head>
<body>
<div class="box">
    <h1>Esta sección aún no está activa</h1>
    <p>El portal de clientes y el inicio de sesión con Google se habilitarán
       cuando se libere La Recepción. Por ahora, El Despacho opera solo con
       el equipo interno.</p>
    <p style="font-size:12px;color:var(--note);margin-top:24px">El Despacho · Learning Center</p>
</div>
</body>
</html>
