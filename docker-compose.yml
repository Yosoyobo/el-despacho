services:
  postgres:
    image: postgres:16-alpine
    container_name: despacho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: despacho-redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  la-gerencia:
    build:
      context: .
      dockerfile: la-gerencia/Dockerfile
    container_name: despacho-gerencia
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_APP: la_gerencia
      DJANGO_ALLOWED_HOSTS: ${GERENCIA_ALLOWED_HOSTS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/credenciales:/data/credenciales
      - ./data/staticfiles-gerencia:/app/staticfiles
    expose:
      - "8001"

  el-taller:
    build:
      context: .
      dockerfile: el-taller/Dockerfile
    container_name: despacho-el-taller
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_APP: el_taller
      DJANGO_ALLOWED_HOSTS: ${TALLER_ALLOWED_HOSTS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      la-gerencia:
        condition: service_started
    volumes:
      - ./data/credenciales:/data/credenciales
      - ./data/staticfiles-taller:/app/staticfiles
    expose:
      - "8000"

  la-recepcion:
    build:
      context: .
      dockerfile: la-recepcion/Dockerfile
    container_name: despacho-la-recepcion
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_APP: la_recepcion
      DJANGO_ALLOWED_HOSTS: ${RECEPCION_ALLOWED_HOSTS}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8002"

  portavoz-worker:
    build:
      context: .
      dockerfile: la-gerencia/Dockerfile
    container_name: despacho-portavoz-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_APP: la_gerencia
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["python", "-m", "lib.portavoz_worker"]

  el-portero:
    image: caddy:2-alpine
    container_name: despacho-el-portero
    restart: unless-stopped
    depends_on:
      - la-gerencia
      - el-taller
      - la-recepcion
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
