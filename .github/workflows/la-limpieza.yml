name: La Limpieza

on:
  schedule:
    - cron: "0 6 * * 0"  # domingos 06:00 UTC
  workflow_dispatch:

jobs:
  poda-ghcr:
    name: Podar tags antiguos de GHCR
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      matrix:
        package: [el-despacho-direccion, el-despacho-taller, el-despacho-recepcion]
    steps:
      - name: Mantener solo las últimas 10 versiones
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: false
