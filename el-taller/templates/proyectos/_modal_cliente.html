{% load forms_helpers %}
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="relative w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl dark:bg-gray-900">
        <button type="button" class="absolute right-4 top-4 text-gray-400 hover:text-gray-600" data-modal-slot-close>&times;</button>
        <h3 class="mb-1 text-lg font-semibold text-gray-900 dark:text-gray-100">Nuevo cliente</h3>
        <p class="mb-4 text-sm text-gray-500 dark:text-gray-400">Lo registramos rápido y queda seleccionado en el proyecto.</p>
        <form hx-post="{% url 'proyectos-cliente-inline' %}" hx-target="#modal-slot" hx-swap="innerHTML">
            {% csrf_token %}
            <div class="space-y-3">
                {% for f in form %}
                <div>
                    <label for="{{ f.id_for_label }}" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">{{ f.label }}</label>
                    {{ f }}
                    {% if f.errors %}<p class="mt-1 text-xs text-error-600 dark:text-error-400">{{ f.errors|join:" · " }}</p>{% endif %}
                </div>
                {% endfor %}
            </div>
            <div class="mt-5 flex justify-end gap-2">
                <button type="button" class="btn-secundario" data-modal-slot-close>Cancelar</button>
                <button type="submit" class="btn-primario">Crear cliente</button>
            </div>
        </form>
    </div>
</div>
