<script>
(function () {
    // S-LC-Feedback-V3: drag & drop Kanban. Cambia estado al soltar en otra columna.
    // Extraído a partial compartido (S-Dashboard-Render) — lo usan la página
    // Kanban completa y el Kanban embebido del Dashboard. Opera sobre selectores
    // globales .kanban-card / .kanban-columna, así que sirve para ambos.
    let dragId = null;
    let dragSrc = null;
    document.querySelectorAll('.kanban-card').forEach(card => {
        card.addEventListener('dragstart', e => {
            dragId = card.getAttribute('data-proyecto-id');
            dragSrc = card.closest('.kanban-dropzone');
            card.classList.add('opacity-50');
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.setData('text/plain', dragId); } catch (_) {}
        });
        card.addEventListener('dragend', () => {
            card.classList.remove('opacity-50');
            document.querySelectorAll('.kanban-columna').forEach(c => c.classList.remove('ring-2', 'ring-brand-400'));
        });
        // Click sigue funcionando: dragstart/dragend no previenen navegación si no hubo drop.
    });
    document.querySelectorAll('.kanban-columna').forEach(col => {
        col.addEventListener('dragover', e => {
            e.preventDefault();
            col.classList.add('ring-2', 'ring-brand-400');
        });
        col.addEventListener('dragleave', () => col.classList.remove('ring-2', 'ring-brand-400'));
        col.addEventListener('drop', async e => {
            e.preventDefault();
            col.classList.remove('ring-2', 'ring-brand-400');
            if (!dragId) return;
            const nuevoEstado = col.getAttribute('data-estado');
            const card = document.querySelector(`.kanban-card[data-proyecto-id="${dragId}"]`);
            if (!card) return;
            const estadoActual = card.getAttribute('data-estado-actual');
            if (estadoActual === nuevoEstado) return; // misma columna, no hacer nada
            // Mueve la tarjeta al DOM de la columna nueva (optimistic UI).
            col.querySelector('.kanban-dropzone').appendChild(card);
            card.setAttribute('data-estado-actual', nuevoEstado);
            // Llama al backend.
            try {
                const csrf = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value
                    || document.cookie.match(/csrftoken=([^;]+)/)?.[1];
                const body = new FormData();
                body.append('estado', nuevoEstado);
                body.append('hx_kanban', '1');
                const resp = await fetch(`/proyectos/${dragId}/cambiar-estado/`, {
                    method: 'POST',
                    headers: {'X-CSRFToken': csrf || '', 'HX-Request': 'true'},
                    body: body,
                });
                // 200/204/302 = OK (302 = django redirect tras save exitoso).
                if (!resp.ok && resp.status !== 204 && resp.status !== 302) {
                    if (dragSrc) dragSrc.appendChild(card);
                    card.setAttribute('data-estado-actual', estadoActual);
                    alert('No se pudo cambiar el estado. Recarga la página.');
                }
            } catch (err) {
                if (dragSrc) dragSrc.appendChild(card);
                card.setAttribute('data-estado-actual', estadoActual);
                alert('Error de red. Recarga la página.');
            }
            dragId = null; dragSrc = null;
        });
    });
    // Token CSRF oculto para la página (necesario porque no hay <form> visible).
    if (!document.querySelector('input[name="csrfmiddlewaretoken"]')) {
        const csrf = document.cookie.match(/csrftoken=([^;]+)/)?.[1];
        if (csrf) {
            const inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = 'csrfmiddlewaretoken'; inp.value = csrf;
            document.body.appendChild(inp);
        }
    }
})();
</script>
