<script>
(function () {
    // S-LC-Feedback-V3: drag & drop Kanban. Cambia estado al soltar en otra columna.
    // Extraído a partial compartido (S-Dashboard-Render) — lo usan la página
    // Kanban completa y el Kanban embebido del Dashboard. Opera sobre selectores
    // globales .kanban-card / .kanban-columna, así que sirve para ambos.
    let dragId = null;
    let dragSrc = null;
    document.querySelectorAll('.kanban-card').forEach(card => {
        card.addEventListener('dragstart', e => {
            dragId = card.getAttribute('data-proyecto-id');
            dragSrc = card.closest('.kanban-dropzone');
            card.classList.add('opacity-50');
            e.dataTransfer.effectAllowed = 'move';
            try { e.dataTransfer.setData('text/plain', dragId); } catch (_) {}
        });
        card.addEventListener('dragend', () => {
            card.classList.remove('opacity-50');
            document.querySelectorAll('.kanban-columna').forEach(c => c.classList.remove('ring-2', 'ring-brand-400'));
        });
        // Click sigue funcionando: dragstart/dragend no previenen navegación si no hubo drop.
    });
    document.querySelectorAll('.kanban-columna').forEach(col => {
        col.addEventListener('dragover', e => {
            e.preventDefault();
            col.classList.add('ring-2', 'ring-brand-400');
        });
        col.addEventListener('dragleave', () => col.classList.remove('ring-2', 'ring-brand-400'));
        col.addEventListener('drop', async e => {
            e.preventDefault();
            col.classList.remove('ring-2', 'ring-brand-400');
            if (!dragId) return;
            const nuevoEstado = col.getAttribute('data-estado');
            const card = document.querySelector(`.kanban-card[data-proyecto-id="${dragId}"]`);
            if (!card) return;
            const estadoActual = card.getAttribute('data-estado-actual');
            if (estadoActual === nuevoEstado) return; // misma columna, no hacer nada
            // Mueve la tarjeta al DOM de la columna nueva (optimistic UI).
            col.querySelector('.kanban-dropzone').appendChild(card);
            card.setAttribute('data-estado-actual', nuevoEstado);
            // Llama al backend.
            try {
                const csrf = document.querySelector('input[name="csrfmiddlewaretoken"]')?.value
                    || document.cookie.match(/csrftoken=([^;]+)/)?.[1];
                const body = new FormData();
                body.append('estado', nuevoEstado);
                body.append('hx_kanban', '1');
                // OJO: sin slash final — la ruta es `cambiar-estado` (no `/`).
                // Django no hace APPEND_SLASH en POST, así que con `/` daba 404
                // → "No se pudo cambiar el estado" (S-LC-Feedback-V7 fix).
                const resp = await fetch(`/proyectos/${dragId}/cambiar-estado`, {
                    method: 'POST',
                    headers: {'X-CSRFToken': csrf || '', 'HX-Request': 'true'},
                    body: body,
                });
                // 200/204/302 = OK (302 = django redirect tras save exitoso).
                if (!resp.ok && resp.status !== 204 && resp.status !== 302) {
                    if (dragSrc) dragSrc.appendChild(card);
                    card.setAttribute('data-estado-actual', estadoActual);
                    alert('No se pudo cambiar el estado. Recarga la página.');
                }
            } catch (err) {
                if (dragSrc) dragSrc.appendChild(card);
                card.setAttribute('data-estado-actual', estadoActual);
                alert('Error de red. Recarga la página.');
            }
            dragId = null; dragSrc = null;
        });
    });
    // --- Buscador del Kanban (LC Buzón §156) — filtrado client-side, debounce ---
    var buscar = document.getElementById('kanban-buscar');
    if (buscar) {
        var norm = function (s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); };
        var sinRes = document.getElementById('kanban-sin-resultados');
        var t = null;
        var aplicar = function () {
            var q = norm(buscar.value.trim());
            var totalVis = 0;
            document.querySelectorAll('.kanban-columna').forEach(function (col) {
                var vis = 0;
                col.querySelectorAll('.kanban-card').forEach(function (card) {
                    var hay = !q || norm(card.getAttribute('data-buscar') || '').indexOf(q) !== -1;
                    card.classList.toggle('hidden', !hay);
                    if (hay) vis++;
                });
                totalVis += vis;
                var cont = col.querySelector('.kanban-contador');
                if (cont) {
                    var tot = cont.getAttribute('data-total') || String(vis);
                    cont.textContent = q ? (vis + '/' + tot) : tot;
                }
            });
            if (sinRes) sinRes.classList.toggle('hidden', !(q && totalVis === 0));
        };
        buscar.addEventListener('input', function () { clearTimeout(t); t = setTimeout(aplicar, 150); });
    }

    // --- Columnas colapsables (LC Buzón §158/159) — persistido en localStorage ---
    var LS_COL = 'kanban-colapsadas';
    var leerCol = function () { try { return JSON.parse(localStorage.getItem(LS_COL) || '[]'); } catch (_) { return []; } };
    var colapsadas = leerCol();
    document.querySelectorAll('.kanban-columna').forEach(function (col) {
        var slug = col.getAttribute('data-estado');
        var zona = col.querySelector('.kanban-dropzone');
        var btn = col.querySelector('.kanban-colapsar');
        var header = col.querySelector('header');
        if (!btn || !zona || !header) return;
        // LC revisión buzón: colapsar picando TODO el encabezado (no solo la
        // flechita chiquita). El botón ▾ queda como afordancia visual.
        header.classList.add('cursor-pointer', 'select-none');
        var pintar = function () {
            var oculto = colapsadas.indexOf(slug) !== -1;
            zona.classList.toggle('hidden', oculto);
            btn.textContent = oculto ? '▸' : '▾';
        };
        pintar();
        header.addEventListener('click', function (e) {
            e.preventDefault(); e.stopPropagation();
            var i = colapsadas.indexOf(slug);
            if (i === -1) colapsadas.push(slug); else colapsadas.splice(i, 1);
            try { localStorage.setItem(LS_COL, JSON.stringify(colapsadas)); } catch (_) {}
            pintar();
        });
    });

    // Token CSRF oculto para la página (necesario porque no hay <form> visible).
    if (!document.querySelector('input[name="csrfmiddlewaretoken"]')) {
        const csrf = document.cookie.match(/csrftoken=([^;]+)/)?.[1];
        if (csrf) {
            const inp = document.createElement('input');
            inp.type = 'hidden'; inp.name = 'csrfmiddlewaretoken'; inp.value = csrf;
            document.body.appendChild(inp);
        }
    }
})();
</script>
