{% load forms_helpers %}
{% comment %}Modal "Registrar gasto" — pide centro, método, quién pagó/solicitó. Wave 5.{% endcomment %}
<div class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-gray-900/50" data-modal-slot-close></div>
    <div class="relative z-10 w-full max-w-lg rounded-2xl border border-gray-200 bg-white p-6 shadow-theme-lg dark:border-gray-800 dark:bg-gray-900">
        <div class="mb-4 flex items-center justify-between">
            <h3 class="text-base font-semibold text-gray-900 dark:text-gray-100">Registrar gasto en Tesorería</h3>
            <button type="button" data-modal-slot-close class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">✕</button>
        </div>

        <div class="mb-4 rounded-xl border border-gray-100 bg-gray-50/60 p-3 text-sm dark:border-gray-800 dark:bg-gray-800/40">
            <p class="text-gray-800 dark:text-gray-100">{{ info.label }}</p>
            <p class="mt-0.5 text-xs text-gray-500 dark:text-gray-400">
                {% if info.proveedor %}{{ info.proveedor.razon_social }} · {% endif %}Monto <span class="font-semibold tabular-nums">{{ info.monto|dinero }}</span>
            </p>
        </div>

        <form hx-post="{% url 'proyectos-registrar-gasto-modal' proyecto.pk clase obj_pk %}" hx-target="#modal-slot" hx-swap="innerHTML" class="campo-form space-y-3">
            {% csrf_token %}
            <div>
                <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">Categoría / centro de costo</label>
                <select name="centro_de_costo">
                    {% for c in centros %}<option value="{{ c.pk }}" {% if centro_default and c.pk == centro_default.pk %}selected{% endif %}>{{ c.nombre }}</option>{% endfor %}
                </select>
            </div>
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <div>
                    <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">Método de pago</label>
                    <select name="metodo">
                        {% for v, l in metodos %}<option value="{{ v }}">{{ l }}</option>{% endfor %}
                    </select>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">Estado del pago</label>
                    <select name="estado_pago">
                        {% for v, l in estados_pago %}<option value="{{ v }}" {% if v == 'pendiente' %}selected{% endif %}>{{ l }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <div>
                    <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">¿Quién pagó?</label>
                    <select name="pagado_por">
                        <option value="">— Nadie / N/A —</option>
                        {% for u in usuarios %}<option value="{{ u.pk }}">{{ u.nombre_completo|default:u.email }}</option>{% endfor %}
                    </select>
                </div>
                <div>
                    <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300">¿Quién solicitó?</label>
                    <select name="solicitado_por">
                        <option value="">— Nadie / N/A —</option>
                        {% for u in usuarios %}<option value="{{ u.pk }}">{{ u.nombre_completo|default:u.email }}</option>{% endfor %}
                    </select>
                </div>
            </div>
            <div class="flex items-center justify-end gap-2 border-t border-gray-100 pt-4 dark:border-gray-800">
                <button type="button" data-modal-slot-close class="btn-secundario">Cancelar</button>
                <button type="submit" class="btn-primario">Registrar egreso</button>
            </div>
        </form>
    </div>
</div>
