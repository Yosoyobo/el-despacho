{% load proyectos_extras %}
{% for p in proyectos %}
<tr class="hover:bg-gray-50 dark:hover:bg-white/[0.02]">
    <td class="px-5 py-3">
        <a href="{% url 'proyectos-detalle' p.pk %}" class="font-mono text-sm font-medium text-brand-600 hover:underline dark:text-brand-400">{{ p.codigo }}</a>
    </td>
    <td class="px-5 py-3 font-medium text-gray-900 dark:text-gray-100">{{ p.nombre }}</td>
    <td class="px-5 py-3 text-gray-600 dark:text-gray-300">{{ p.cliente.razon_social }}</td>
    <td class="px-5 py-3"><span class="badge {{ p.estado|color_estado }}">{{ p.get_estado_display }}</span></td>
    <td class="px-5 py-3 text-gray-600 dark:text-gray-300">{{ p.fecha_compromiso|date:"d M Y"|default:"—" }}</td>
</tr>
{% empty %}
<tr><td colspan="5" class="px-5 py-10 text-center text-sm text-gray-500 dark:text-gray-400">Sin proyectos visibles.</td></tr>
{% endfor %}
