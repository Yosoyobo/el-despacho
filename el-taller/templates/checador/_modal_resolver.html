<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm dark:bg-gray-900/80">
    <div class="relative mx-4 w-full max-w-md rounded-2xl border border-gray-200 bg-white shadow-theme-lg dark:border-gray-800 dark:bg-gray-900">
        <header class="flex items-start justify-between gap-3 border-b border-gray-200 px-5 py-4 dark:border-gray-800">
            <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100">Resolver corrección</h2>
            <button type="button" data-modal-slot-close class="rounded-lg p-1 text-gray-400 transition hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-800 dark:hover:text-gray-200" aria-label="Cerrar">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12" stroke-linecap="round"/></svg>
            </button>
        </header>

        <div class="space-y-2 px-5 py-4 text-sm text-gray-700 dark:text-gray-300">
            <p><span class="text-gray-500 dark:text-gray-400">Solicita:</span> {{ sol.usuario.nombre_completo|default:sol.usuario.email }}</p>
            <p><span class="text-gray-500 dark:text-gray-400">Corrección:</span> {{ sol.get_tipo_display }} → <strong class="tabular-nums">{{ sol.valor_propuesto|hfmt:"D j N H:i" }}</strong></p>
            <p><span class="text-gray-500 dark:text-gray-400">Motivo:</span> {{ sol.motivo }}</p>
        </div>

        <form hx-post="{% url 'checador:correccion_resolver' sol.pk %}" hx-target="#modal-slot" hx-swap="innerHTML" class="campo-form">
            {% csrf_token %}
            <div class="px-5 pb-2">
                <label for="resolver-comentario" class="mb-1.5 block text-sm font-medium text-gray-700 dark:text-gray-300">Comentario (opcional)</label>
                <textarea name="comentario" id="resolver-comentario" rows="2" placeholder="Nota para el solicitante"></textarea>
            </div>
            <footer class="flex flex-wrap items-center justify-end gap-2 border-t border-gray-200 px-5 py-3 dark:border-gray-800">
                <button type="submit" name="decision" value="rechazar" class="inline-flex items-center gap-2 rounded-lg border border-error-300 px-4 py-2 text-sm font-medium text-error-600 hover:bg-error-50 dark:border-error-500/30 dark:text-error-400 dark:hover:bg-error-500/10">Rechazar</button>
                <button type="submit" name="decision" value="aprobar" class="inline-flex items-center gap-2 rounded-lg bg-success-500 px-4 py-2 text-sm font-medium text-white hover:bg-success-600">Aprobar</button>
            </footer>
        </form>
    </div>
</div>
