<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm dark:bg-gray-900/80">
    <div class="relative mx-4 w-full max-w-md rounded-2xl border border-gray-200 bg-white shadow-theme-lg dark:border-gray-800 dark:bg-gray-900">
        <header class="flex items-start justify-between gap-3 border-b border-gray-200 px-5 py-4 dark:border-gray-800">
            <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100">Captura manual de tiempo</h2>
            <button type="button" data-modal-slot-close class="rounded-lg p-1 text-gray-400 transition hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-800 dark:hover:text-gray-200" aria-label="Cerrar">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12" stroke-linecap="round"/></svg>
            </button>
        </header>

        <form method="post" action="{% url 'checador:sesion' %}" class="campo-form">
            {% csrf_token %}
            <div class="space-y-4 px-5 py-4 text-sm">
                <div>
                    <label for="sesion-proyecto" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Proyecto</label>
                    <select name="proyecto" id="sesion-proyecto" required>
                        <option value="">— Elige un proyecto —</option>
                        {% for p in proyectos %}<option value="{{ p.pk }}">{{ p.codigo }} · {{ p.nombre }}</option>{% endfor %}
                    </select>
                </div>
                <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
                    <div>
                        <label for="sesion-inicio" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Inicio</label>
                        <input type="datetime-local" name="inicio" id="sesion-inicio" required>
                    </div>
                    <div>
                        <label for="sesion-fin" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Fin</label>
                        <input type="datetime-local" name="fin" id="sesion-fin" required>
                    </div>
                </div>
                <div>
                    <label for="sesion-nota" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Nota (opcional)</label>
                    <textarea name="nota" id="sesion-nota" rows="2" placeholder="¿En qué trabajaste?"></textarea>
                </div>
            </div>
            <footer class="flex flex-wrap items-center justify-end gap-2 border-t border-gray-200 px-5 py-3 dark:border-gray-800">
                <button type="button" data-modal-slot-close class="btn-secundario">Cancelar</button>
                <button type="submit" class="btn-primario">Guardar</button>
            </footer>
        </form>
    </div>
</div>
