<div class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 backdrop-blur-sm dark:bg-gray-900/80">
    <div class="relative mx-4 w-full max-w-md rounded-2xl border border-gray-200 bg-white shadow-theme-lg dark:border-gray-800 dark:bg-gray-900">
        <header class="flex items-start justify-between gap-3 border-b border-gray-200 px-5 py-4 dark:border-gray-800">
            <h2 class="text-base font-semibold text-gray-900 dark:text-gray-100">Ajustar jornada</h2>
            <button type="button" data-modal-slot-close class="rounded-lg p-1 text-gray-400 transition hover:bg-gray-100 hover:text-gray-700 dark:hover:bg-gray-800 dark:hover:text-gray-200" aria-label="Cerrar">
                <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12" stroke-linecap="round"/></svg>
            </button>
        </header>
        <form method="post" action="{% url 'checador:ajuste_jornada' %}" class="campo-form">
            {% csrf_token %}
            <div class="space-y-4 px-5 py-4 text-sm">
                <p class="text-xs text-gray-500 dark:text-gray-400">Pide ajustar tu entrada y salida del día, o registrar un día que olvidaste checar. Un administrador lo aprueba.</p>
                <div>
                    <label for="aj-fecha" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Día</label>
                    <input type="date" name="fecha" id="aj-fecha" required value="{{ jornada.fecha|date:'Y-m-d' }}">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label for="aj-entrada" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Entrada</label>
                        <input type="time" name="entrada" id="aj-entrada" value="{{ jornada.entrada_en|date:'H:i' }}">
                    </div>
                    <div>
                        <label for="aj-salida" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Salida</label>
                        <input type="time" name="salida" id="aj-salida" value="{{ jornada.salida_en|date:'H:i' }}">
                    </div>
                </div>
                <div>
                    <label for="aj-motivo" class="mb-1.5 block font-medium text-gray-700 dark:text-gray-300">Motivo</label>
                    <textarea name="motivo" id="aj-motivo" rows="2" required placeholder="Explica por qué pides el ajuste"></textarea>
                </div>
            </div>
            <footer class="flex flex-wrap items-center justify-end gap-2 border-t border-gray-200 px-5 py-3 dark:border-gray-800">
                <button type="button" data-modal-slot-close class="btn-secundario">Cancelar</button>
                <button type="submit" class="btn-primario">Enviar solicitud</button>
            </footer>
        </form>
    </div>
</div>
