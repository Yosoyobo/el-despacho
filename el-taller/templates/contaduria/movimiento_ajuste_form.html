{% extends "base.html" %}
{% block title %}Ajuste de saldo — La Contaduría{% endblock %}
{% block contenido %}
<header class="mb-6">
    <p class="text-xs font-medium uppercase tracking-wider text-brand-500 dark:text-brand-400">Nuevo movimiento · Ajuste</p>
    <h1 class="mt-1 text-title-sm font-semibold tracking-tight text-gray-900 dark:text-gray-100">Ajuste de saldo</h1>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Corrige un saldo que no cuadra con la realidad. Anota la razón con detalle.</p>
</header>

<form method="post" class="space-y-6">
    {% csrf_token %}
    <section class="ta-card">
        <div class="grid gap-4 md:grid-cols-2">
            <div class="md:col-span-2">
                <label for="aju-cuenta" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200">Qué cuenta ajustar</label>
                <select id="aju-cuenta" name="cuenta" required>
                    <option value="">— Selecciona —</option>
                    {% for c in cuentas %}<option value="{{ c.pk }}" {% if valores.cuenta == c.pk|stringformat:"s" %}selected{% endif %}>{{ c.nombre }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <span class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200">¿Sube o baja el saldo?</span>
                <div class="flex gap-4">
                    <label class="inline-flex items-center gap-2 text-sm">
                        <input type="radio" name="direccion" value="sube" {% if valores.direccion == 'sube' or not valores.direccion %}checked{% endif %} required> Sube
                    </label>
                    <label class="inline-flex items-center gap-2 text-sm">
                        <input type="radio" name="direccion" value="baja" {% if valores.direccion == 'baja' %}checked{% endif %}> Baja
                    </label>
                </div>
            </div>
            <div>
                <label for="aju-monto" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200">Monto del ajuste</label>
                <div class="relative">
                    <span class="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">$</span>
                    <input id="aju-monto" type="number" step="0.01" min="0.01" name="monto" value="{{ valores.monto|default:'' }}" required class="pl-7">
                </div>
            </div>
            <div>
                <label for="aju-fecha" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200">Fecha</label>
                <input id="aju-fecha" type="date" name="fecha" value="{{ valores.fecha|default:default_fecha }}" required>
            </div>
            <div class="md:col-span-2">
                <label for="aju-motivo" class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-200">Por qué este ajuste</label>
                <textarea id="aju-motivo" name="motivo" rows="3" required placeholder="Ej. Conté el efectivo y faltaban $50 — probablemente un gasto sin recibo">{{ valores.motivo|default:'' }}</textarea>
            </div>
        </div>
    </section>

    <div class="flex justify-end gap-2">
        <a href="{% url 'contaduria:movimiento-nuevo' %}" class="btn-secundario">← Atrás</a>
        <button type="submit" class="btn-primario">Registrar ajuste</button>
    </div>
</form>
{% endblock %}
