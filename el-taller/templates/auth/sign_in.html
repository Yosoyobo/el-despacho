{% extends "base.html" %}
{% block title %}Iniciar sesión — El Taller{% endblock %}
{% block contenido_publico %}
<div class="mx-auto max-w-md">
    <div class="rounded-2xl border border-gray-200 bg-white p-8 shadow-theme-sm dark:border-gray-800 dark:bg-gray-900">
        <div class="mb-6 flex items-center gap-3">
            <span class="inline-flex h-10 w-10 items-center justify-center rounded-lg bg-brand-500 text-white font-semibold">T</span>
            <div>
                <h1 class="text-title-xs font-semibold text-gray-900 dark:text-gray-100">El Taller</h1>
                <p class="text-xs text-gray-500 dark:text-gray-400">CRM/ERP interno · Learning Center</p>
            </div>
        </div>

        <form method="post" class="campo-form space-y-5">
            {% csrf_token %}
            <div>
                <label>Email</label>
                <input type="email" name="email" required autofocus>
            </div>
            <div>
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-primario w-full">Entrar</button>
        </form>

        {% if google_oauth_configurado %}
        <div class="my-5 flex items-center text-xs text-gray-400 dark:text-gray-500">
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-800"></div>
            <span class="px-3">o</span>
            <div class="flex-1 h-px bg-gray-200 dark:bg-gray-800"></div>
        </div>
        <a href="{% url 'google_oauth:iniciar' %}" class="btn-secundario w-full">
            {% include "_google_logo.html" %}
            Continuar con Google
        </a>
        {% endif %}
    </div>
</div>
{% endblock %}
