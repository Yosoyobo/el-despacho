{% extends "base.html" %}
{% block title %}Iniciar sesión — El Taller{% endblock %}
{% block contenido %}
<div class="max-w-md mx-auto bg-white border border-stone-200 rounded-lg shadow-sm p-8 mt-12">
    <h1 class="text-2xl font-semibold mb-1">El Taller</h1>
    <p class="text-sm text-stone-500 mb-6">CRM/ERP interno · Learning Center</p>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium mb-1">Email</label>
            <input type="email" name="email" required autofocus
                   class="w-full px-3 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-300 focus:border-amber-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Contraseña</label>
            <input type="password" name="password" required
                   class="w-full px-3 py-2 border border-stone-300 rounded-md focus:ring-2 focus:ring-amber-300 focus:border-amber-500 outline-none">
        </div>
        <button type="submit"
                class="w-full bg-amber-700 hover:bg-amber-800 text-white font-medium py-2 rounded-md">
            Entrar
        </button>
    </form>

    {% if google_listo %}
    <div class="my-4 flex items-center text-xs text-stone-400">
        <div class="flex-1 h-px bg-stone-200"></div><span class="px-3">o</span><div class="flex-1 h-px bg-stone-200"></div>
    </div>
    <a href="/auth/google/start"
       class="w-full inline-flex justify-center items-center gap-2 border border-stone-300 hover:bg-stone-50 text-stone-700 font-medium py-2 rounded-md">
        Entrar con Google
    </a>
    {% endif %}
</div>
{% endblock %}
