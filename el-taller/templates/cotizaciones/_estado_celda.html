{% comment %}Fase 3 §1.4: UN solo control de estado (dropdown coloreado) que
muestra Y cambia el estado — antes convivían pastilla + select y deformaban el
alto de la fila. El <select> toma el color del estado (clase .estado-chip +
--ec). Versiones no editables (anulada/rechazada) → pastilla estática. Se
auto-swap por HTMX. Espera `c` (cotización) y `estados_cot` (ciclo activo).{% endcomment %}
<span id="cot-estado-{{ c.pk }}" class="inline-flex items-center gap-1 whitespace-nowrap">
    {% if c.estado_visible == 'vencida' %}<span title="Vencida" aria-label="Vencida" class="text-warning-500">⚠</span>{% endif %}
    {% if c.estado != 'anulada' and c.estado != 'rechazada' and estados_cot %}
    <select name="estado" aria-label="Cambiar estado" data-activo
            style="--ec: {{ c.estado_color }}; border-color: color-mix(in srgb, {{ c.estado_color }} 40%, transparent);"
            class="estado-chip cursor-pointer rounded-lg border px-2 py-1 text-xs font-medium focus:outline-none focus:ring-2 focus:ring-brand-400"
            hx-post="{% url 'cotizaciones:estado-inline' c.pk %}"
            hx-trigger="change" hx-target="#cot-estado-{{ c.pk }}" hx-swap="outerHTML"
            hx-include="#csrf-cot-{{ c.pk }}">
        {% for e in estados_cot %}
        <option value="{{ e.slug }}" {% if e.slug == c.estado %}selected{% endif %}>{{ e.label }}</option>
        {% endfor %}
    </select>
    <input type="hidden" id="csrf-cot-{{ c.pk }}" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
    {% else %}
    <span class="badge badge-hex" style="--ec: {{ c.estado_color }}">{{ c.get_estado_display }}</span>
    {% endif %}
</span>
