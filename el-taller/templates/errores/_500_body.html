{% load static %}
{# Body de 500 (Taller) — preserva botón "Reportar al Buzón" del sprint Interfono. #}
<div class="mx-auto max-w-xl rounded-2xl border border-error-200 bg-white p-8 text-center shadow-theme-sm dark:border-error-500/30 dark:bg-gray-900">
    <img src="{% static 'branding/Logo_LC-128.png' %}" alt="Learning Center" class="mx-auto mb-4 h-24 w-24 rounded-2xl" />
    <div class="mx-auto mb-4 inline-flex h-16 w-16 items-center justify-center rounded-full bg-error-50 text-3xl dark:bg-error-500/15">😬</div>
    <h1 class="mb-2 text-title-xs font-semibold text-gray-900 dark:text-gray-100">Algo se rompió</h1>
    <p class="mb-6 text-sm text-gray-600 dark:text-gray-300">El servidor regresó error 500. El equipo ya fue notificado.</p>
    <div class="flex flex-wrap items-center justify-center gap-2">
        <a href="{% url 'recados:buzon_nuevo' %}?tipo=problema&asunto=Error+500+en+{{ request.path|urlencode }}" class="btn-primario">Reportar al Buzón</a>
        <a href="/" class="btn-secundario">← Inicio</a>
    </div>
</div>
