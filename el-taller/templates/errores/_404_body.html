{# Body de 404 (Taller) — preserva botón "Reportar al Buzón" del sprint Interfono. #}
<div class="mx-auto max-w-xl rounded-2xl border border-gray-200 bg-white p-8 text-center shadow-theme-sm dark:border-gray-800 dark:bg-gray-900">
    <div class="mx-auto mb-4 inline-flex h-16 w-16 items-center justify-center rounded-full bg-gray-100 text-3xl dark:bg-gray-800">🔎</div>
    <h1 class="mb-2 text-title-xs font-semibold text-gray-900 dark:text-gray-100">No encontramos esa página</h1>
    <p class="mb-6 text-sm text-gray-600 dark:text-gray-300">La URL <code class="rounded bg-gray-100 px-1.5 py-0.5 text-xs dark:bg-gray-800">{{ request.path }}</code> no existe en El Taller.</p>
    <div class="flex flex-wrap items-center justify-center gap-2">
        <a href="{% url 'buzon-empleado-nuevo' %}?tipo=problema&asunto=404+en+{{ request.path|urlencode }}" class="btn-secundario">Reportar al Buzón</a>
        <a href="/" class="btn-primario">← Inicio</a>
    </div>
</div>
