{% comment %}Card de KPI de consumo. Params: valor, titulo, sub, color.{% endcomment %}
<div class="rounded-2xl border border-gray-200 bg-white p-4 shadow-theme-sm dark:border-gray-800 dark:bg-gray-900">
    <p class="text-2xl font-bold tabular-nums text-{{ color|default:'gray' }}-600 break-all dark:text-{{ color|default:'gray' }}-400">{{ valor }}</p>
    <p class="mt-1 text-sm font-medium text-gray-700 dark:text-gray-200">{{ titulo }}</p>
    <p class="text-xs text-gray-400 dark:text-gray-500">{{ sub }}</p>
</div>
