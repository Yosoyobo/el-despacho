[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]
ignore = ["E501"]

[tool.pytest.ini_options]
pythonpath = [".", "lib", "el-taller", "la-gerencia"]
testpaths = ["tests"]
python_files = ["test_*.py"]
DJANGO_SETTINGS_MODULE = "tests.django_settings"
filterwarnings = ["ignore::DeprecationWarning"]
markers = [
    "taller: tests del proyecto El Taller (CRUDs S1b)",
    "gerencia: tests del proyecto La Gerencia (Directorio, Ajustes)",
    "redis: requiere Redis corriendo en REDIS_URL",
]
